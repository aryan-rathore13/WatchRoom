services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    ports:
      - "7880:7880"    # HTTP/WS
      - "7881:7881"    # TCP TURN
      - "443:443/udp"  # UDP TURN
      - "3478:3478/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    networks:
      - watchroom

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: watchroom
      POSTGRES_PASSWORD: watchroom
      POSTGRES_DB: watchroom
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - watchroom

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - watchroom

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - watchroom

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:

networks:
  watchroom:
    driver: bridge
