name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @watchroom/api db:generate

      - name: Validate Prisma schema
        run: pnpm --filter @watchroom/api exec prisma validate

      - name: Build API (type check)
        run: pnpm --filter @watchroom/api build

      - name: Build Web (includes type check + lint)
        run: pnpm --filter @watchroom/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
